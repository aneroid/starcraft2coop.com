services:
  php:
    container_name: sc2coop-php
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - ./html:/var/www/html
      - ./source-data:/var/www/source-data
      - ./source-html:/var/www/source-html
      - ./includes:/var/www/includes
      - ./config.php:/var/www/config.php
      - ./generate.php:/var/www/generate.php
      - ./generate.ts:/var/www/generate.ts

  web:
    container_name: sc2coop-web
    build:
      context: .
      dockerfile: docker/Dockerfile.apache
    ports:
      - "8080:80"
    volumes:
      - ./html:/var/www/html
    depends_on:
      - php

  db:
    # the values here should match config.php
    container_name: sc2coop-db  # DB_HOST
    image: mariadb:10.11
    environment:
      MARIADB_USER: sc2coop  # DB_USER
      MARIADB_PASSWORD: sc2coop  # DB_PASS
      MARIADB_DATABASE: starcraf_coop  # DB_NAME
      MARIADB_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - ./dbdata:/var/lib/mysql
      - ./starcraft_coop.sql:/docker-entrypoint-initdb.d/init.sql
